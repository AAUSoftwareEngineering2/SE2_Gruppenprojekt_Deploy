# Diese Zusatzrechte machen den read-only Headlamp-Login dashboard-tauglich.
#
# Die normale Kubernetes-Rolle `view` reicht für viele Namespaced-Ressourcen,
# aber nicht für alle clusterweiten Ressourcen und nicht für alle CRDs, die
# Headlamp anfragt. Diese Rolle bleibt read-only und gibt bewusst keine Secrets
# frei.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-dashboard-viewer
rules:
  # Core-API ohne Secrets. `pods/log` erlaubt Log-Ansicht, aber keine Änderungen.
  - apiGroups:
      - ""
    resources:
      - componentstatuses
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - nodes
      - nodes/status
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - pods/log
      - podtemplates
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
    verbs:
      - get
      - list
      - watch

  # Standard-Kubernetes-APIs und die für uns relevanten CRDs.
  - apiGroups:
      - admissionregistration.k8s.io
      - apiextensions.k8s.io
      - apiregistration.k8s.io
      - apps
      - autoscaling
      - batch
      - certificates.k8s.io
      - coordination.k8s.io
      - discovery.k8s.io
      - events.k8s.io
      - flowcontrol.apiserver.k8s.io
      - gateway.networking.k8s.io
      - helm.cattle.io
      - helm.toolkit.fluxcd.io
      - image.toolkit.fluxcd.io
      - kustomize.toolkit.fluxcd.io
      - networking.k8s.io
      - node.k8s.io
      - notification.toolkit.fluxcd.io
      - policy
      - rbac.authorization.k8s.io
      - scheduling.k8s.io
      - source.toolkit.fluxcd.io
      - storage.k8s.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch

  # Live-Metriken für CPU/RAM. Der metrics-server läuft im Cluster.
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-dashboard-viewer
subjects:
  - kind: ServiceAccount
    name: headlamp-viewer
    namespace: headlamp
roleRef:
  kind: ClusterRole
  name: headlamp-dashboard-viewer
  apiGroup: rbac.authorization.k8s.io
