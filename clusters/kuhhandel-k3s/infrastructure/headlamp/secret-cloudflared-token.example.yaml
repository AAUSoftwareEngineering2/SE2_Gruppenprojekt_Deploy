# Beispiel für das Headlamp-Cloudflare-Tunnel-Secret.
#
# Diese Datei ist nur eine Vorlage und wird nicht deployed. Der echte Token darf
# nicht ins Repo. Das echte Secret heißt `cloudflared-token` und liegt im
# Namespace `cloudflare-headlamp`.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: cloudflare-headlamp
type: Opaque
stringData:
  token: "REPLACE_WITH_HEADLAMP_CLOUDFLARE_TUNNEL_TOKEN"

