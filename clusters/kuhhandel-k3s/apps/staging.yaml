# Diese Datei sagt Flux:
# "Deploye den Staging-Kubernetes-Ordner aus dem App-Repo."
#
# Staging ist getrennt von Production, verwendet eigene Namespaces und kann
# dadurch zum Testen aktualisiert werden, ohne Production direkt anzufassen.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kuhhandel-staging
  namespace: flux-system
spec:
  # Wie oft Flux in Git nach Änderungen sucht und den Zielzustand prüft.
  interval: 1m0s
  # Wie schnell Flux nach einem Fehler erneut probiert.
  retryInterval: 30s
  # Wie lange Flux auf ein erfolgreiches Anwenden und Ready-Werden wartet.
  timeout: 3m0s
  # Diese Git-Quelle zeigt auf das normale Kuhhandel-App-Repo.
  sourceRef:
    kind: GitRepository
    name: kuhhandel-app-staging
  # Das ist der Staging-Einstiegspunkt im App-Repo.
  path: ./deploy/k8s/overlays/staging
  # Das App-Repo darf als Default `staging` verwenden. Flux ersetzt den Tag
  # hier durch den neuesten Staging-Build, der deployed werden soll.
  images:
    - name: ghcr.io/aausoftwareengineering2/kuhhandel-server
      newTag: staging-34-bc1bda5 # {"$imagepolicy": "flux-system:kuhhandel-server-staging:tag"}
  # Wenn eine Ressource aus Git entfernt wird, entfernt Flux sie auch im Cluster.
  prune: true
  # Flux wartet darauf, dass Deployments, Pods usw. wirklich ready werden.
  wait: true
